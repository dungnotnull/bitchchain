name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check agent/ tools/ tests/

      - name: Type check with mypy
        run: mypy agent/ tools/ --ignore-missing-imports || true

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Run privacy layer crypto tests
        run: python -c "from agent.modules.privacy_layer import PedersenCommitment, RangeProof, ConfidentialTransactionEngine; c = PedersenCommitment.create(1000000); assert c.verify(); rp = RangeProof.create(1000000, c.blinding_factor); assert RangeProof.verify(rp); print('Crypto tests passed')"

      - name: Run wallet tests
        run: python -c "from agent.modules.wallet import KeyPair; kp = KeyPair.generate(); assert KeyPair.from_private_key(kp.private_key).address == kp.address; print('Wallet tests passed')"
